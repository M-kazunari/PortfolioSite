<!doctype html>
<html lang="ja">
    <head>
        <meta charset='utf-8'>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>ポートフォリオサイト - SERIO</title> 
        <!--リセットCSS-->
        <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css">
        <!--フォントファミリー設定-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
        <!--スタイルシート設定-->
        <link rel="stylesheet" href="style.css">
        <!--ファビコン-->
        <link rel="icon" href="img/favicon2.png" type="image/png">
    </head>

    <body>
        <!--ヘッダー-->
        <header class="ly_header">
            <div class="ly_header_inner">
                <a class="bl_header_logo" href="index.html"><img src="img/logo_serio Transparent.png" alt="Logo-SERIO"></a>
                <nav>
                    <ul class="bl_headerNav" id="js_nav">
                        <li class="bl_headerNav_item">
                            <a class="bl_headerNav_link" href="#service-link" onclick="navOff()">サービス内容・提供価格</a>
                        </li>
                        <li class="bl_headerNav_item">
                            <a class="bl_headerNav_link" href="#achievements-link" onclick="navOff()">制作実績</a>
                        </li>
                        <li class="bl_headerNav_item">
                            <a class="bl_headerNav_link" href="#profile-link" onclick="navOff()">自己紹介</a>
                        </li>
                        <li class="bl_headerNav_item">
                            <a class="bl_headerNav_link" href="#inquiry-link" onclick="navOff()">お問い合わせ</a>
                        </li>
                    </ul>
                </nav>
                <button class="bl_hamburger" id="js_hamburger" aria-label="メニューを開く" onclick="navToggle()">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
            <!--/. ly_header_inner-->
        </header>
        <div class="bl_navOverlay" id="js_navOverlay" onclick="navOff()"></div>

        <!-- サイトトップ -->
        <main>
            <!-- トップ画像 -->
            <div class="ly_hero">
                <img src="img/bg-coding.png" alt="bg-coding">
                <div class="ly_hero_inner">
                    <h1 class="el_heroTitle">
                        誠実に、丁寧に。
                    </h1>
                    <p class="el_heroText">
                        Webサイト制作・Webアプリケーション開発
                        フロントエンド / バックエンド、フルスタックで対応します。
                        「こんなものが作りたい」という想いに、真剣に向き合います。
                    </p>
                </div>
                <!--/. ly_hero_inner-->
            </div>
            <!--/. ly_hero-->

            <!-- サービス内容・提供価格 -->
            <section class="ly_service" id="service-link">
                <div class="ly_service_inner">
                    <div class="title ly_service_title">
                        <h1 class="el_lv1Heading">
                            service
                        </h1>
                        <h2 class="el_lv2Heading">
                            サービス内容・提供価格
                        </h2>
                    </div>
                    <!-- サービス内容：コーディング -->
                    <div class="bl_card">
                        <figure class="bl_card_imgWrapper">
                            <img src="img/service-coding.png" alt="写真：コーディングの写真">
                        </figure>
                        <div class="bl_card_body">
                            <h3 class="bl_card_ttl">
                                コーディング
                            </h3>
                            <p class="bl_card_txt">
                                デザインカンプや仕様書をもとに、HTML・CSS・JavaScriptを用いて丁寧にコーディングします。レスポンシブ対応はもちろん、読みやすいコード・保守しやすい構造を意識した実装を心がけています。
                            </p>
                        </div>
                    </div>
                </div>
                <!-- /. ly_service_inner -->
            </section>

            
        </main>

    <script>
        //ハンバーガーメニュー設定
        function navToggle() {
            const hamburger = document.getElementById('js_hamburger');
            const nav = document.getElementById('js_nav');
            const overlay = document.getElementById('js_navOverlay');
            hamburger.classList.toggle('is_active');
            nav.classList.toggle('is_active');
            overlay.classList.toggle('is_active');
            const isOpen = hamburger.classList.contains('is_active');
            hamburger.setAttribute('aria-label', isOpen ? 'メニューを閉じる' : 'メニューを開く');
        }
        function navOff() {
            const hamburger = document.getElementById('js_hamburger');
            const nav = document.getElementById('js_nav');
            const overlay = document.getElementById('js_navOverlay');
            hamburger.classList.remove('is_active');
            nav.classList.remove('is_active');
            overlay.classList.remove('is_active');
            hamburger.setAttribute('aria-label', 'メニューを開く');
        }
    </script>
    </body>

</html>
